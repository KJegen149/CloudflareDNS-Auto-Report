name = "cloudflare-dns-auto-report"
main = "src/index.js"
compatibility_date = "2026-03-26"
account_id = "9f86f3b73ff40da02bce7f31c93e98bd"

# ── Cron triggers ────────────────────────────────────────────────────────────
# Three triggers fire at 08:00 UTC on their respective schedules.
# The worker checks each account's configured frequency against the cron
# pattern that fired and only generates reports for matching accounts.
[triggers]
crons = [
  "0 8 * * *",   # daily   — every day at 08:00 UTC
  "0 8 * * 1",   # weekly  — every Monday at 08:00 UTC
  "0 8 1 * *",   # monthly — 1st of every month at 08:00 UTC
]

# ── KV namespace (stores non-secret account config) ──────────────────────────
[[kv_namespaces]]
binding    = "DNS_REPORT_CONFIG"
id         = "386e4fff563a47f3bcf7af1f2581f8c7"
preview_id = "af4c81a8c8d747d29d0eafc4f33a7221"

# ── Secrets (set via: npx wrangler secret put SECRET_NAME) ──────────────────
# List the secrets your worker uses so wrangler validates them at deploy time.
# Never put actual values here — use `wrangler secret put`.
[secrets]
# Cloudflare API tokens (one per account, named to match api_token_secret in KV config):
#   wrangler secret put CF_TOKEN_APPLE_JUICE
#   wrangler secret put CF_TOKEN_ORANGE_JUICE
#
# Email API key (Resend):
#   wrangler secret put RESEND_API_KEY
#   wrangler secret put EMAIL_FROM_ADDRESS
#   wrangler secret put EMAIL_FROM_NAME

# ── Observability ─────────────────────────────────────────────────────────────
[observability]
enabled = true
